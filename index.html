
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);font-size:14px;color:var(--color-text-primary)}
.tabs{display:flex;gap:4px;padding:10px 14px 0;border-bottom:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary);flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;border:0.5px solid transparent;color:var(--color-text-secondary);background:transparent;white-space:nowrap}
.tab.active{background:var(--color-background-primary);border-color:var(--color-border-tertiary);border-bottom-color:var(--color-background-primary);color:var(--color-text-primary);font-weight:500}
.panel{display:none;padding:14px}.panel.active{display:block}
.card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px;margin-bottom:12px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px;flex-wrap:wrap}
.card-title{font-weight:500;font-size:14px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:500}
.badge-blue{background:#E6F1FB;color:#0C447C}.badge-green{background:#EAF3DE;color:#27500A}.badge-amber{background:#FAEEDA;color:#633806}.badge-red{background:#FCEBEB;color:#791F1F}.badge-gray{background:#F1EFE8;color:#444441}.badge-teal{background:#E1F5EE;color:#085041}.badge-purple{background:#EEEDFE;color:#3C3489}
label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:7px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:13px;font-family:var(--font-sans);background:var(--color-background-primary);color:var(--color-text-primary);outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD;box-shadow:0 0 0 2px #E6F1FB}
textarea{resize:vertical;min-height:60px;line-height:1.5}
.grid2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.grid3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px}
.field{margin-bottom:10px}
.btn{padding:7px 14px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;cursor:pointer;font-family:var(--font-sans)}
.btn:hover{background:var(--color-background-secondary)}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}.btn-primary:hover{background:#0C447C}
.btn-danger{background:#FCEBEB;color:#791F1F;border-color:#F7C1C1}.btn-danger:hover{background:#F7C1C1}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-xs{padding:2px 8px;font-size:11px}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);gap:8px;flex-wrap:wrap}
.summary-row:last-child{border-bottom:none}
.metric-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px}
.metric-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.metric-value{font-size:20px;font-weight:500}
.project-item{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:12px;background:var(--color-background-primary);margin-bottom:8px}
.project-name{font-weight:500;font-size:13px}
.status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px;flex-shrink:0;vertical-align:middle}
.dot-green{background:#1D9E75}.dot-amber{background:#EF9F27}.dot-blue{background:#378ADD}.dot-gray{background:#888780}.dot-red{background:#E24B4A}.dot-teal{background:#1D9E75}
.inline-flex{display:flex;align-items:center;gap:8px}
.filter-bar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.ym-s{width:auto;padding:5px 10px;font-size:13px}
.section-label{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.4px;margin-bottom:6px;margin-top:10px}
.alert-success{background:#EAF3DE;color:#27500A;border:0.5px solid #C0DD97;padding:8px 12px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:10px}
.pivot-table{width:100%;border-collapse:collapse;font-size:12px}
.pivot-table th{background:var(--color-background-secondary);padding:7px 10px;text-align:left;font-weight:500;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.pivot-table td{padding:6px 10px;border:0.5px solid var(--color-border-tertiary);vertical-align:top}
.pivot-table tr:hover td{background:var(--color-background-secondary)}
.pivot-table .num{text-align:right;font-variant-numeric:tabular-nums}
.pivot-table .total{font-weight:500;background:var(--color-background-secondary)}
.history-item{padding:5px 10px;border-left:2px solid var(--color-border-tertiary);margin:4px 0;font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.history-item.latest{border-left-color:#185FA5;color:var(--color-text-primary)}
.export-area{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:14px;font-size:13px;line-height:1.9;white-space:pre-wrap;font-family:var(--font-mono);max-height:480px;overflow-y:auto;margin-top:10px;border:0.5px solid var(--color-border-tertiary)}
.tab-sub{display:flex;gap:4px;margin-bottom:14px;flex-wrap:wrap}
.tab-sub-btn{padding:5px 12px;border:0.5px solid var(--color-border-tertiary);border-radius:20px;font-size:12px;cursor:pointer;background:transparent;color:var(--color-text-secondary)}
.tab-sub-btn.active{background:#185FA5;color:#fff;border-color:#185FA5}
.sub-panel{display:none}.sub-panel.active{display:block}
</style>
<h2 class="sr-only">工作总结管理工具 v4</h2>

<div class="tabs">

</div>

<div id="panel-export" class="panel">

    <div id="daily-out"></div>

    <div id="weekly-out"></div>

  <div id="sub-monthly" class="sub-panel">

      <div style="display:flex;gap:8px">
        <button class="btn btn-primary" onclick="genMonthly()">生成月报</button>
        <button class="btn" onclick="copyOut('monthly-out')">复制</button>
      </div>
    </div>
    <div id="monthly-out"></div>
  </div>
</div>

let state={perf:[],projects:[],weeklies:[]};
function save(){try{localStorage.setItem('ws4',JSON.stringify(state))}catch(e){}}
function load(){
  try{
    const d=localStorage.getItem('ws4');
    if(d){state=JSON.parse(d);SEED.forEach(s=>{if(!state.perf.find(p=>p.id===s.id))state.perf.push(s);});save();}

  }catch(e){state.perf=SEED.slice();save();}
}

function switchTab(name){

function addPerf(){
  const year=document.getElementById('perf-year').value,month=document.getElementById('perf-month').value,week=document.getElementById('perf-week').value;
  const type=document.getElementById('perf-type').value,client=document.getElementById('perf-client').value.trim();

function renderPerf(){
  const year=document.getElementById('view-year').value,month=document.getElementById('view-month').value;
  const md=state.perf.filter(p=>p.year===year&&p.month===month);
  const ts=md.filter(p=>p.type==='业绩').reduce((a,b)=>a+b.amount,0);
  const tr=md.filter(p=>p.type==='回款').reduce((a,b)=>a+b.amount,0);
  const nd=md.filter(p=>p.type==='新成交');
  document.getElementById('metrics').innerHTML=`
    <div class="metric"><div class="metric-label">${month}月总业绩</div><div class="metric-value" style="color:#185FA5">${fmt(ts)}</div></div>
    <div class="metric"><div class="metric-label">${month}月总回款</div><div class="metric-value" style="color:#1D9E75">${fmt(tr)}</div></div>
    <div class="metric"><div class="metric-label">本月新成交</div><div class="metric-value" style="color:#BA7517">${nd.length}家</div></div>
    <div class="metric"><div class="metric-label">记录条数</div><div class="metric-value">${md.length}</div></div>`;
  const weeks=['第一周','第二周','第三周','第四周'];
  let html='';
  weeks.forEach(w=>{
    const wd=md.filter(p=>p.week===w);if(!wd.length)return;
    const ws=wd.filter(p=>p.type==='业绩').reduce((a,b)=>a+b.amount,0);
    const wr=wd.filter(p=>p.type==='回款').reduce((a,b)=>a+b.amount,0);
    const wn=wd.filter(p=>p.type==='新成交');
    html+=`<div class="card"><div class="card-header"><span class="card-title">${year}年${month}月 ${w}</span>
      <span class="inline-flex">${ws?`<span class="badge badge-blue">业绩 ${fmt(ws)}</span>`:''}${wr?`<span class="badge badge-green">回款 ${fmt(wr)}</span>`:''}${wn.length?`<span class="badge badge-amber">新成交 ${wn.length}家</span>`:''}</span></div>`;
    wd.forEach(p=>{
      const dc=p.type==='业绩'?'dot-blue':p.type==='回款'?'dot-green':'dot-amber';
      const bc=p.type==='业绩'?'badge-blue':p.type==='回款'?'badge-green':'badge-amber';
      html+=`<div class="summary-row">
        <span class="inline-flex"><span class="status-dot ${dc}"></span><span class="badge ${bc}" style="font-size:10px">${p.type}</span><span style="font-size:13px">${p.client}</span>${p.noAmount?'<span class="badge badge-gray" style="font-size:10px">无金额</span>':''}</span>
        <span class="inline-flex">${(!p.noAmount&&p.amount)?`<span style="font-weight:500">${fmt(p.amount)}</span>`:''}${p.note?`<span style="color:var(--color-text-secondary);font-size:12px">${p.note}</span>`:''}<button class="btn btn-danger btn-xs" onclick="delPerf(${p.id})">删</button></span>
      </div>`;
    });
    html+='</div>';
  });
  document.getElementById('perf-list').innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--color-text-secondary);font-size:13px">暂无记录</div>';
  renderPivot();
}

function delPerf(id){state.perf=state.perf.filter(p=>p.id!==id);save();renderPerf();}

function renderPivot(){
  const year=document.getElementById('view-year').value,month=document.getElementById('view-month').value;
  const type=document.getElementById('pivot-type').value;
  const md=state.perf.filter(p=>p.year===year&&p.month===month&&p.type===type);
  const weeks=['第一周','第二周','第三周','第四周'];
  const clients=[...new Set(md.map(p=>p.client))];
  if(!clients.length){document.getElementById('pivot-wrap').innerHTML='<div style="font-size:12px;color:var(--color-text-secondary);padding:8px">暂无数据</div>';return;}
  let html=`<table class="pivot-table"><thead><tr><th>客户</th>`;
  weeks.forEach(w=>{if(md.some(p=>p.week===w))html+=`<th class="num">${w}</th>`;});
  html+=`<th class="num">合计</th></tr></thead><tbody>`;
  const activeWeeks=weeks.filter(w=>md.some(p=>p.week===w));
  let colTotals={};activeWeeks.forEach(w=>colTotals[w]=0);let grandTotal=0;
  clients.forEach(c=>{
    const rows=md.filter(p=>p.client===c);
    const total=rows.reduce((a,b)=>a+b.amount,0);grandTotal+=total;
    html+=`<tr><td style="font-size:12px">${c}</td>`;
    activeWeeks.forEach(w=>{
      const amt=rows.filter(p=>p.week===w).reduce((a,b)=>a+b.amount,0);
      colTotals[w]+=amt;
      html+=`<td class="num" style="font-size:12px">${amt?fmt(amt):'—'}</td>`;
    });
    html+=type==='新成交'?`<td class="num" style="font-size:12px">1家</td>`:`<td class="num" style="font-size:12px;font-weight:500">${total?fmt(total):'—'}</td>`;
    html+='</tr>';
  });
  html+=`<tr class="total"><td style="font-size:12px">合计</td>`;
  activeWeeks.forEach(w=>{html+=`<td class="num" style="font-size:12px">${colTotals[w]?fmt(colTotals[w]):'—'}</td>`;});
  html+=type==='新成交'?`<td class="num" style="font-size:12px">${clients.length}家</td>`:`<td class="num" style="font-size:12px">${fmt(grandTotal)}</td>`;
  html+='</tr></tbody></table>';
  document.getElementById('pivot-wrap').innerHTML=html;
}

function renderProjects(){
  const fy=document.getElementById('pj-year').value,fm=document.getElementById('pj-month').value,fs=document.getElementById('pj-status').value;
  const grouped={};
  state.projects.forEach(p=>{
    const k=p.name||p.client;
    if(!grouped[k])grouped[k]=[];
    grouped[k].push(p);
  });
  const keys=Object.keys(grouped);
  if(!keys.length){document.getElementById('proj-list').innerHTML='<div style="text-align:center;padding:20px;color:var(--color-text-secondary);font-size:13px">暂无项目</div>';return;}
  let html='';
  keys.forEach(k=>{
    const entries=grouped[k].sort((a,b)=>b.id-a.id);
    const latest=entries[0];
    const ymOk=(fy==='all'||latest.year===fy)&&(fm==='all'||latest.month===fm);
    const stOk=fs==='all'||latest.status===fs;
    if(!ymOk||!stOk)return;
    const sc=SC[latest.status]||{label:latest.status,badge:'badge-gray',dot:'dot-gray'};
    const pc=latest.priority==='高'?'badge-red':latest.priority==='中'?'badge-amber':'badge-gray';
    html+=`<div class="project-item">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px">
        <div>
          <div class="inline-flex" style="margin-bottom:3px"><span class="status-dot ${sc.dot}"></span><span class="project-name">${latest.client}</span></div>
          ${latest.model?`<div style="font-size:12px;color:var(--color-text-secondary);margin-left:13px">${latest.model}</div>`:''}
        </div>
        <div class="inline-flex" style="flex-shrink:0"><span class="badge ${pc}">${latest.priority}优先</span><span class="badge ${sc.badge}">${sc.label}</span></div>
      </div>
      ${latest.price?`<div style="font-size:13px;margin-bottom:6px">报价：<span style="font-weight:500;color:#185FA5">${fmt(latest.price)}</span></div>`:''}
      <div style="font-size:12px;color:var(--color-text-secondary);background:var(--color-background-secondary);padding:6px 10px;border-radius:var(--border-radius-md);margin-bottom:6px;line-height:1.6">${latest.progress||'暂无进展'}</div>
      ${entries.length>1?`<div style="margin-bottom:6px">
        <button class="btn btn-xs" onclick="toggleHistory('hist_${k.replace(/[^a-zA-Z0-9]/g,'_')}')">历史记录 (${entries.length-1}条)</button>
        <div id="hist_${k.replace(/[^a-zA-Z0-9]/g,'_')}" style="display:none;margin-top:6px">
          ${entries.slice(1).map(e=>`<div class="history-item"><span style="font-size:11px;color:var(--color-text-secondary)">${e.date} · ${SC[e.status]?.label||e.status}</span><br>${e.progress||'—'}</div>`).join('')}
        </div></div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--color-text-secondary)">${latest.year}年${latest.month}月 · ${latest.date}</span>
        <div class="inline-flex">
          <button class="btn btn-xs" onclick="fillEditProj('${k}')">追加进展</button>
          <button class="btn btn-danger btn-xs" onclick="delProjGroup('${k}')">删除全部</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('proj-list').innerHTML=html||'<div style="text-align:center;padding:20px;color:var(--color-text-secondary);font-size:13px">暂无符合条件的项目</div>';
}

  let r=`【${year}年${date} 日报】\n${'─'.repeat(30)}\n\n`;
  r+=`1. 今日业绩\n${perf?perf.split('\n').map(l=>'  '+l).join('\n'):'  （无）'}\n\n`;
  r+=`2. 今日回款\n${recov?recov.split('\n').map(l=>'  '+l).join('\n'):'  （无）'}\n\n`;
  if(deal)r+=`3. 今日新成交\n${deal.split('\n').map(l=>'  '+l).join('\n')}\n\n`;
  if(proj)r+=`4. 项目进展\n${proj.split('\n').map(l=>'  '+l).join('\n')}\n\n`;
  if(other)r+=`5. 其他\n${other.split('\n').map(l=>'  '+l).join('\n')}\n`;
  window._dailyText=r;
  document.getElementById('daily-out').innerHTML=`<div class="export-area">${r}</div>`;
}

function genWeekly(){
  const year=document.getElementById('ew-year').value,month=document.getElementById('ew-month').value,week=document.getElementById('ew-week').value;
  const wd=state.weeklies.find(w=>w.year===year&&w.month===month&&w.week===week);
  const pd=state.perf.filter(p=>p.year===year&&p.month===month&&p.week===week);
  const ws=pd.filter(p=>p.type==='业绩').reduce((a,b)=>a+b.amount,0);
  const wr=pd.filter(p=>p.type==='回款').reduce((a,b)=>a+b.amount,0);
  const wn=pd.filter(p=>p.type==='新成交');

  function groupByClient(arr){const m={};arr.forEach(p=>{if(!m[p.client])m[p.client]={client:p.client,amount:0,noAmount:p.noAmount};m[p.client].amount+=p.amount;});return Object.values(m);}

  let r=`【${year}年${month}月 ${week} 周报】\n${'─'.repeat(30)}\n\n`;
  r+=`1. 本周业绩：${fmt(ws)}\n`;
  groupByClient(pd.filter(p=>p.type==='业绩')).forEach(p=>{r+=`  ${p.client} ${fmt(p.amount)}\n`;});
  r+='\n';
  r+=`2. 本周回款：${fmt(wr)}\n`;
  groupByClient(pd.filter(p=>p.type==='回款')).forEach(p=>{r+=`  ${p.client} ${fmt(p.amount)}\n`;});
  r+='\n';
  if(wn.length){r+=`3. 本周新成交：${wn.length}家\n`;wn.forEach(p=>{r+=`  ${p.client}\n`;});r+='\n';}
  if(wd){
    if(wd.mid||wd.long||wd.newClients)r+=`4. 客户投入\n  中等投入：${wd.mid||0}个 | 长期投入：${wd.long||0}个 | 新增背调：${wd.newClients||0}个\n\n`;
    if(wd.orders)r+=`5. 已确认订单\n  ${wd.orders}\n\n`;
    if(wd.quoted)r+=`6. 已报价/已提供方案\n  ${wd.quoted}\n\n`;
    if(wd.pending)r+=`7. 方案确认中\n  ${wd.pending}\n\n`;
    if(wd.keyorders)r+=`8. 重点订单情况\n  ${wd.keyorders}\n\n`;
    if(wd.aftersales)r+=`9. 售后情况\n  ${wd.aftersales}\n\n`;
    if(wd.plan)r+=`10. 下周计划\n  ${wd.plan}\n`;
  }
  window._weeklyText=r;
  document.getElementById('weekly-out').innerHTML=`<div class="export-area">${r}</div>`;
}

function genMonthly(){
  const year=document.getElementById('em-year').value,month=document.getElementById('em-month').value;
  const cumulMode=document.getElementById('em-cumul').value;
  const mNum=parseInt(month);
  const md=state.perf.filter(p=>p.year===year&&p.month===month);
  const cd=state.perf.filter(p=>cumulMode==='year'?(p.year===year&&parseInt(p.month)<=mNum):(parseInt(p.year)<parseInt(year)||(p.year===year&&parseInt(p.month)<=mNum)));

  function groupByClient(arr){const m={};arr.forEach(p=>{if(!m[p.client])m[p.client]={client:p.client,amount:0,noAmount:p.noAmount};m[p.client].amount+=p.amount;if(p.noAmount)m[p.client].noAmount=true;});return Object.values(m);}
  const fl=p=>p.noAmount?`  ${p.client}`:`  ${p.client} ${fmt(p.amount)}`;

  const sM=md.filter(p=>p.type==='业绩'),sC=cd.filter(p=>p.type==='业绩');
  const rM=md.filter(p=>p.type==='回款'),rC=cd.filter(p=>p.type==='回款');
  const dM=md.filter(p=>p.type==='新成交'),dC=cd.filter(p=>p.type==='新成交');

  let r='';
  r+=`1. 本月业绩：\n`;
  if(sM.length)groupByClient(sM).forEach(p=>{r+=fl(p)+'\n';});else r+=`  （暂无）\n`;
  r+=`截至本月总业绩：${fmt(sC.reduce((a,b)=>a+b.amount,0))}\n`;
  groupByClient(sC).forEach(p=>{r+=fl(p)+'\n';});
  r+='\n';
  r+=`2. 本月回款：\n`;
  if(rM.length)groupByClient(rM).forEach(p=>{r+=fl(p)+'\n';});else r+=`  （暂无）\n`;
  r+=`截至本月总回款：${fmt(rC.reduce((a,b)=>a+b.amount,0))}\n`;
  groupByClient(rC).forEach(p=>{r+=fl(p)+'\n';});
  r+='\n';
  r+=`3. 本月新成交：${dM.length}家\n`;
  if(dM.length)dM.forEach(p=>{r+=fl(p)+'\n';});else r+=`  （暂无）\n`;
  r+=`截至本月总新成交：${dC.length}家\n`;
  dC.forEach(p=>{r+=fl(p)+'\n';});

  window._monthlyText=r;
  document.getElementById('monthly-out').innerHTML=`<div class="export-area">${r}</div>`;
}

function copyOut(id){
  const map={daily:window._dailyText,weekly:window._weeklyText,monthly:window._monthlyText};
  const key=id.replace('-out','');
  const txt=map[key];
  if(!txt){if(key==='daily')genDaily();else if(key==='weekly')genWeekly();else genMonthly();return;}
  navigator.clipboard.writeText(txt).then(()=>{
    const el=event.target;const o=el.textContent;el.textContent='已复制！';setTimeout(()=>el.textContent=o,1500);
  });
}

renderPerf();
renderPivot();
</script>
